{% extends "base.html" %}

{% block content %}
{% load crispy_forms_tags %}

<div class="row">
    <!--load side bar here-->
    {% include 'dashboard/sidebar.html' %}
    <!-- Right side content -->
     <div class="col-md-9">
        <h2> Edit Category</h2>
        <form action="{% url 'edit_category' category.id %}" method="POST" style="width:500px;">
            {% csrf_token %}
            {{ form | crispy }}
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
        <br>
     </div>
</div>

{% endblock %}
